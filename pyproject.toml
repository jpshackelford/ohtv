[project]
name = "ohtv"
# x-release-please-version
version = "0.16.0"
description = "OpenHands Trajectory Viewer - CLI tool for viewing and syncing conversation histories"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "JP Shackelford" }]
dependencies = [
    "click>=8.0",
    "httpx>=0.27",
    "numpy>=2.0,<3.0",
    "openhands-sdk>=1.16.1",
    "pyyaml>=6.0",
    "rich>=13.0",
    "tomli_w>=1.0",
]

[project.optional-dependencies]
charts = ["matplotlib>=3.8"]

[project.scripts]
ohtv = "ohtv.cli:main"



[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ohtv"]


[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "tests"]


[tool.semantic_release]
# Source of truth for the current version. python-semantic-release will read
# this, compute the next version from new conventional-commit subjects since
# the last matching tag, and write the bump back into both files in one commit.
version_variables = ["src/ohtv/__init__.py:__version__"]
version_toml      = ["pyproject.toml:project.version"]

# Keep continuity with the existing `ohtv-v0.14.0` tag created by release-please
# so the first run after this swap diffs against a real prior release rather
# than the initial commit.
tag_format = "ohtv-v{version}"

# `[skip ci]` prevents the auto-generated bump commit from re-triggering the
# release workflow on push.
commit_message = "chore(release): ohtv {version} [skip ci]\n\nAutomatically generated by python-semantic-release."
commit_author  = "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

# Repo is pre-1.0 and we want to stay there — `feat!:` or `BREAKING CHANGE:`
# should bump 0.14 → 0.15 (minor), not 0.14 → 1.0 (major). When the repo
# graduates to 1.x, flip both of these.
allow_zero_version = true
major_on_zero      = false

changelog_file = "CHANGELOG.md"

[tool.semantic_release.commit_parser_options]
# Match the existing AGENTS.md "commit contract" table exactly:
#   feat → minor, fix/perf → patch, breaking-change footer → major,
#   everything else → no release.
allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "perf", "style", "refactor", "test", "revert"]
minor_tags   = ["feat"]
patch_tags   = ["fix", "perf"]

[tool.semantic_release.branches.main]
match      = "main"
prerelease = false


[dependency-groups]
dev = [
    "hypothesis>=6.153.6",
    "matplotlib>=3.8",
    "pytest>=8.0",
    "pytest-httpx>=0.30",
    "pyyaml>=6.0",
    "ruff>=0.15.13",
]

