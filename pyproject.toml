[project]
name = "ohtv"
version = "0.1.0"
description = "OpenHands Trajectory Viewer - CLI tool for viewing and syncing conversation histories"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "JP Shackelford" }]
dependencies = [
    "click>=8.0",
    "httpx>=0.27",
    "rich>=13.0",
]

[project.scripts]
ohtv = "ohtv.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ohtv"]

[tool.uv]
dev-dependencies = ["pytest>=8.0", "pytest-httpx>=0.30"]
